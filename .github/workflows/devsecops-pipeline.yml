name: Secure DevSecOps Pipeline - Final Version

on: [push]

jobs:
  security_scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Security Tools
        run: |
          pip install bandit safety

      - name: 1. SAST (Code Scan)
        # سيقوم بفحص app.py وحفظ النتيجة في sast_report.txt
        run: bandit -r app.py -f txt -o sast_report.txt || true

      - name: 2. SCA (Dependency Scan)
        # سيقوم بفحص المكتبات وحفظ النتيجة في sca_report.txt
        run: safety check -r requirements.txt --full-report > sca_report.txt || true

      - name: 3. Secret Scan
        # سيقوم بالبحث عن الأسرار ولن يوقف الـ Pipeline بفضل continue-on-error
        continue-on-error: true
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified

      - name: 4. Upload All Reports
        # هذه هي الخطوة التي كانت تنقصك، ستقوم بجمع كل التقارير ورفعها
        if: always() # تضمن الرفع حتى لو فشلت الخطوات السابقة
        uses: actions/upload-artifact@v4
        with:
          name: Full-Security-Audit-Reports
          path: |
            sast_report.txt
            sca_report.txt
